<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Program banner placeholder</title>
  <desc id="desc">Fallback image shown when a program has no banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E3F2FD" />
      <stop offset="1" stop-color="#BBDEFB" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1280" cy="180" r="220" fill="#90CAF9" opacity="0.45" />
  <circle cx="260" cy="760" r="280" fill="#64B5F6" opacity="0.35" />
  <g fill="#1E88E5" opacity="0.85">
    <rect x="340" y="610" width="920" height="130" rx="16" />
    <rect x="420" y="320" width="760" height="210" rx="20" />
  </g>
  <g fill="#FFFFFF">
    <rect x="500" y="390" width="600" height="18" rx="9" />
    <rect x="500" y="430" width="420" height="18" rx="9" opacity="0.9" />
    <rect x="500" y="650" width="420" height="18" rx="9" opacity="0.95" />
    <rect x="500" y="690" width="300" height="18" rx="9" opacity="0.9" />
  </g>
</svg>
