services:
    production:
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        command: ["php", "artisan", "octane:start", "--server=frankenphp", "--host=0.0.0.0", "--port=8080"]
        env_file: ".env"
        environment:
            AUTORUN_ENABLED: true
            AUTORUN_LARAVEL_STORAGE_LINK: false
            AUTORUN_LARAVEL_VIEW_CACHE: false
            HEALTHCHECK_PATH: "/up"
            OCTANE_HTTPS: "true"
            OCTANE_SERVER: frankenphp
            PHP_OPCACHE_ENABLE: "1"
            PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"
            DB_HOST: "pgsql"
            REDIS_HOST: "redis"
        healthcheck:
            test: ["CMD", "healthcheck-octane"]
            start_period: 10s
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - app

    production-schedule:
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        command: ["php", "/var/www/html/artisan", "schedule:work"]
        env_file: ".env"
        environment:
            AUTORUN_ENABLED: false
            DB_HOST: "pgsql"
            REDIS_HOST: "redis"
            POWERSYNC_CONFIG_PATH: /config/service.yaml
            NODE_OPTIONS: --max-old-space-size-percentage=80
            PS_DATA_SOURCE_URI: "${POWERSYNC_DATA_SOURCE_URI:-postgresql://powersync:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable}"
            PS_STORAGE_SOURCE_URI: "${POWERSYNC_STORAGE_SOURCE_URI:-postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/powersync_storage?sslmode=disable}"
            PS_JWT_SECRET: "${POWERSYNC_JWT_SECRET:-powersync-local-poc-secret-32_bytes!}"
            POWERSYNC_ADMIN_API_TOKEN: "${POWERSYNC_ADMIN_API_TOKEN:-powersync-local-admin-token}"
        depends_on:
            - production
        networks:
            - app

    production-queue:
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        command: ["php", "/var/www/html/artisan", "queue:work", "--tries=3"]
        env_file: ".env"
        environment:
            AUTORUN_ENABLED: false
            DB_HOST: "pgsql"
            REDIS_HOST: "redis"
        depends_on:
            - production
        networks:
            - app

    pgsql:
        image: "postgis/postgis:18-3.6"
        restart: unless-stopped
        command:
            - postgres
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
            # PowerSync logical replication WAL budget per slot. Sized for ~20
            # synced tables (2 streams), FOR ALL TABLES publication, and initial
            # snapshot / sync-config redeploy headroom. Raise if PSYNC_S1146 occurs.
            - -c
            - max_slot_wal_keep_size=${POSTGRES_MAX_SLOT_WAL_KEEP_SIZE:-8GB}
        environment:
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - "./config/pgsql/create-powersync-user.sh:/docker-entrypoint-initdb.d/20-create-powersync-user.sh:ro"
            - "pgsql:/var/lib/postgresql"
        networks:
            - app
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -q -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"
            interval: 10s
            retries: 5
            timeout: 5s
            start_period: 30s

    powersync:
        # Sync Streams (sync-config.yaml edition: 3) require PowerSync Service v1.20.0+.
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        entrypoint: ["/bin/sh", "/opt/powersync/entrypoint.sh"]
        command: ["start", "-r", "unified"]
        environment:
            POWERSYNC_CONFIG_PATH: /config/service.yaml
            NODE_OPTIONS: --max-old-space-size=1000
            PS_PORT: "8080"
            PS_DATA_SOURCE_URI: "${POWERSYNC_DATA_SOURCE_URI:-postgresql://powersync:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable}"
            PS_STORAGE_SOURCE_URI: "${POWERSYNC_STORAGE_SOURCE_URI:-postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/powersync_storage?sslmode=disable}"
            PS_JWT_SECRET: "${POWERSYNC_JWT_SECRET:-powersync-local-poc-secret-32_bytes!}"
            PS_ADMIN_API_TOKEN: "${POWERSYNC_ADMIN_API_TOKEN:-powersync-local-admin-token}"
        depends_on:
            pgsql:
                condition: service_healthy
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://localhost:8080/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
            interval: 5s
            timeout: 2s
            retries: 15

    redis:
        image: "redis:alpine"
        restart: unless-stopped
        volumes:
            - "redis:/data"
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

networks:
    app:
        driver: bridge

volumes:
    pgsql:
        driver: local
    redis:
        driver: local
