services:
    production:
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        env_file: ".env"
        environment:
            AUTORUN_ENABLED: true
            AUTORUN_LARAVEL_VIEW_CACHE: false
            HEALTHCHECK_PATH: "/up"
            DB_HOST: "pgsql"
            REDIS_HOST: "redis"
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
            garage:
                condition: service_healthy
        networks:
            - app

    production-schedule:
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        command: ["php", "/var/www/html/artisan", "schedule:work"]
        env_file: ".env"
        environment:
            AUTORUN_ENABLED: false
            DB_HOST: "pgsql"
            REDIS_HOST: "redis"
        depends_on:
            - production
        networks:
            - app

    production-queue:
        image: "${PRODUCTION_IMAGE}"
        restart: unless-stopped
        command: ["php", "/var/www/html/artisan", "queue:work", "--tries=3"]
        env_file: ".env"
        environment:
            AUTORUN_ENABLED: false
            DB_HOST: "pgsql"
            REDIS_HOST: "redis"
        depends_on:
            - production
        networks:
            - app

    pgsql:
        image: "postgis/postgis:18-3.6"
        restart: unless-stopped
        command:
            - postgres
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
        environment:
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - "./config/schema:/schema"
            - "./config/pgsql/create-powersync-user.sh:/docker-entrypoint-initdb.d/20-create-powersync-user.sh:ro"
            - "pgsql:/var/lib/postgresql"
        networks:
            - app
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -q -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"
            interval: 10s
            retries: 5
            timeout: 5s
            start_period: 30s

    powersync:
        # Sync Streams (sync-config.yaml edition: 3) require PowerSync Service v1.20.0+.
        image: "journeyapps/powersync-service:latest"
        restart: unless-stopped
        entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
        command: ["start", "-r", "unified"]
        volumes:
            - "./config/powersync:/config:ro"
        environment:
            POWERSYNC_CONFIG_PATH: /config/service.yaml
            NODE_OPTIONS: --max-old-space-size=1000
            PS_PORT: "8080"
            PS_DATA_SOURCE_URI: "${POWERSYNC_DATA_SOURCE_URI:-postgresql://powersync:password@pgsql:5432/${DB_DATABASE}?sslmode=disable}"
            PS_STORAGE_SOURCE_URI: "${POWERSYNC_STORAGE_SOURCE_URI:-postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/powersync_storage?sslmode=disable}"
            PS_JWT_SECRET: "${POWERSYNC_JWT_SECRET:-powersync-local-poc-secret-32_bytes!}"
        depends_on:
            pgsql:
                condition: service_healthy
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://localhost:8080/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
            interval: 5s
            timeout: 2s
            retries: 15

    redis:
        image: "redis:alpine"
        restart: unless-stopped
        volumes:
            - "redis:/data"
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    garage:
        image: "dxflrs/garage:v2.3.0"
        restart: unless-stopped
        command: "/garage server --single-node --default-bucket"
        environment:
            GARAGE_DEFAULT_ACCESS_KEY: "${AWS_ACCESS_KEY_ID}"
            GARAGE_DEFAULT_SECRET_KEY: "${AWS_SECRET_ACCESS_KEY}"
            GARAGE_DEFAULT_BUCKET: "${AWS_BUCKET:-app}"
        volumes:
            - "./config/garage/garage.toml:/etc/garage.toml:ro"
            - "garage-meta:/var/lib/garage/meta"
            - "garage-data:/var/lib/garage/data"
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - /garage
                - -c
                - /etc/garage.toml
                - status
            retries: 3
            timeout: 5s

networks:
    app:
        driver: bridge

volumes:
    pgsql:
        driver: local
    redis:
        driver: local
    garage-meta:
        driver: local
    garage-data:
        driver: local
