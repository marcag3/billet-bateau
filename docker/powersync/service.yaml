# yaml-language-server: $schema=https://unpkg.com/@powersync/service-schema@latest/json-schema/powersync-config.json

telemetry:
  disable_telemetry_sharing: true

replication:
  connections:
    - type: postgresql
      uri: !env PS_DATA_SOURCE_URI
      sslmode: disable

storage:
  type: postgresql
  uri: !env PS_STORAGE_SOURCE_URI
  sslmode: disable

port: !env PS_PORT

sync_config:
  path: sync-rules.yaml

client_auth:
  audience: ['powersync-dev', 'powersync']
  jwks:
    keys:
      - kty: oct
        alg: HS256
        kid: local-dev
        k: !env PS_JWT_SECRET_B64URL

api:
  tokens:
    - powersync-local-admin-token
