# Sync Streams (edition 3). Included via service.yaml → sync_config.path.
# See: https://docs.powersync.com/sync/streams/overview
#
# Semantics (replaces legacy sync-rules buckets):
# - programs + boat_types + boats: scoped to JWT user (auth.user_id()).
# - addresses: global reference data for every authenticated user
# - media: rows for programs and boat types owned by the user (Spatie morph)

config:
  edition: 3

streams:
  user_programs_boats:
    auto_subscribe: true
    queries:
      - SELECT * FROM programs WHERE user_id = auth.user_id()
      - SELECT * FROM boat_types WHERE user_id = auth.user_id()
      - SELECT * FROM boats WHERE user_id = auth.user_id()

  global_addresses:
    auto_subscribe: true
    query: SELECT * FROM addresses

  user_program_media:
    auto_subscribe: true
    query: |
      SELECT * FROM media
      WHERE (model_type = 'App\Models\Program'
        AND model_id IN (SELECT id FROM programs WHERE user_id = auth.user_id()))
         OR (model_type = 'App\Models\BoatType'
        AND model_id IN (SELECT id FROM boat_types WHERE user_id = auth.user_id()))
