# Sync Streams (edition 3). Included via service.yaml → sync_config.path.
# See: https://docs.powersync.com/sync/streams/overview
#
# Staff shared data (no user_id visibility scoping). Global streams auto-subscribe;
# program_scope syncs roster boats + pivot for a client-selected program_id.

config:
  edition: 3

streams:
  global_boat_types:
    auto_subscribe: true
    query: SELECT * FROM boat_types

  global_addresses:
    auto_subscribe: true
    query: SELECT * FROM addresses

  global_media:
    auto_subscribe: true
    query: SELECT * FROM media

  global_programs:
    auto_subscribe: true
    query: SELECT * FROM programs

  # Client supplies program_id; JWT proves staff session. IN staff_program_ids ties subscription to auth (PowerSync requirement).
  # Shared staff data: programs are not scoped by row user_id — any authenticated bearer gets all program ids in the CTE.
  program_scope:
    with:
      staff_program_ids: |
        SELECT id AS program_id
        FROM programs
        WHERE auth.user_id() = auth.user_id()
    queries:
      - |
        SELECT * FROM boat_program
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN staff_program_ids
      - |
        SELECT * FROM boats
        WHERE id IN (
          SELECT boat_id FROM boat_program
          WHERE program_id = subscription.parameter('program_id')
            AND program_id IN staff_program_ids
        )
