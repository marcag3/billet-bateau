# Sync Streams (edition 3). Included via service.yaml → sync_config.path.
# See: https://docs.powersync.com/sync/streams/overview
#
# Programs are visible only to the owner (programs.user_id) or members (program_user).
# user_scope auto-subscribes the program list; program_scope adds detail rows (boats, trips, templates, boat_types, media) for selected program_id.

config:
  edition: 3

streams:
  user_scope:
    auto_subscribe: true
    with:
      accessible_program_ids: |
        SELECT id AS program_id FROM programs WHERE user_id = auth.user_id()
        UNION
        SELECT program_id FROM program_user WHERE user_id = auth.user_id()
    queries:
      - |
        SELECT * FROM programs
        WHERE id IN accessible_program_ids

  program_scope:
    with:
      accessible_program_ids: |
        SELECT id AS program_id FROM programs WHERE user_id = auth.user_id()
        UNION
        SELECT program_id FROM program_user WHERE user_id = auth.user_id()
    queries:
      - |
        SELECT * FROM boat_types
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
      - |
        SELECT * FROM media
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
      - |
        SELECT * FROM boat_program
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
      - |
        SELECT * FROM boats
        WHERE id IN (
          SELECT boat_id FROM boat_program
          WHERE program_id = subscription.parameter('program_id')
            AND program_id IN accessible_program_ids
        )
      - |
        SELECT * FROM trips
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
      - |
        SELECT * FROM water_routes
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
      - |
        SELECT * FROM template_days
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
      - |
        SELECT template_day_slots.*
        FROM template_day_slots
        INNER JOIN template_days ON template_days.id = template_day_slots.template_day_id
        WHERE template_days.program_id = subscription.parameter('program_id')
          AND template_days.program_id IN accessible_program_ids
      - |
        SELECT * FROM template_day_dates
        WHERE program_id = subscription.parameter('program_id')
          AND program_id IN accessible_program_ids
