services:
  laravel.test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
        NODE_VERSION: "${NODE_VERSION:-22}"
    ports:
      - "${APP_PORT:-80}:80"
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    environment:
      LARAVEL_SAIL: 1
      WWWUSER: "${WWWUSER:-1000}"
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=xdebug://nameserver}"
      IGNITION_LOCAL_SITES_PATH: "${PWD}"
      PHP_CLI_SERVER_WORKERS: "2"
    volumes:
      - ".:/var/www/html"
    command: php artisan serve --host=0.0.0.0 --port=80
    depends_on:
      pgsql:
        condition: service_healthy
      electric:
        condition: service_started
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - app

  mailpit:
    image: "axllent/mailpit:latest"
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - app

  electric:
    ports:
      - "${FORWARD_ELECTRIC_PORT:-5133}:3000"

  pgsql:
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - "./docker/pgsql/create-testing-databases.sql:/docker-entrypoint-initdb.d/10-create-testing-databases.sql"

  redis:
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"

  garage:
    ports:
      - "${FORWARD_GARAGE_PORT:-9000}:3900"
      - "${FORWARD_GARAGE_WEB_PORT:-8900}:3902"
