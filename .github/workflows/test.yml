name: tests and analysis

on:
  workflow_dispatch:
  pull_request:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: ubuntu:22.04
    env:
      extensions: mbstring, dom, fileinfo, pgsql, redis, bcmath, gd, pdo_sqlite
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: postgres
        options: --health-cmd="pg_isready -U root -d postgres" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis
        ports:
          - 6379/tcp
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      matrix:
        php-version: ["8.3"]

    steps:
      - name: Verify PostgreSQL and create test databases
        run: |
          apt-get update
          apt-get install -y postgresql-client
          PGPASSWORD=root psql -h postgres -U root -d postgres -c "SELECT datname FROM pg_database"
          PGPASSWORD=root psql -h postgres -U root -d postgres -c "CREATE DATABASE testing"
          PGPASSWORD=root psql -h postgres -U root -d postgres -c "CREATE DATABASE testing_mom"

      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: overtrue/phplint,
          extensions: ${{ env.extensions }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check PHP syntax
        run: phplint --exclude=*.log .

      - uses: "ramsey/composer-install@v2"
        name: Install Composer & Dependencies
        with:
          composer-options: "--no-scripts --prefer-dist"

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Phpstan static analysis
        run: ./vendor/bin/phpstan analyse

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create tmp dir
        run: mkdir -p storage/tmp

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        run: vendor/bin/phpunit --testsuite Unit,Feature