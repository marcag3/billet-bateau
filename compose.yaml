services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
            target: development
            args:
                WWWUSER: "${WWWUSER:-1000}"
                WWWGROUP: "${WWWGROUP:-1000}"
                NODE_VERSION: "${NODE_VERSION:-24}"
        ports:
            - "${APP_PORT:-80}:80"
            - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        environment:
            LARAVEL_SAIL: 1
            WWWUSER: "${WWWUSER:-1000}"
            XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
            XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=xdebug://nameserver}"
            IGNITION_LOCAL_SITES_PATH: "${PWD}"
            PHP_CLI_SERVER_WORKERS: "2"
        volumes:
            - ".:/var/www/html"
        command: php artisan serve --host=0.0.0.0 --port=80
        depends_on:
            pgsql:
                condition: service_healthy
            powersync:
                condition: service_healthy
            redis:
                condition: service_healthy
            garage:
                condition: service_healthy
            mailpit:
                condition: service_started
        networks:
            - app

    mailpit:
        image: "axllent/mailpit:latest"
        ports:
            - "${FORWARD_MAILPIT_PORT:-1025}:1025"
            - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
        networks:
            - app

    pgsql:
        image: "postgis/postgis:18-3.6"
        restart: unless-stopped
        command:
            - postgres
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
        environment:
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        ports:
            - "${FORWARD_DB_PORT:-5432}:5432"
        volumes:
            - "./deploy/config/schema:/schema"
            - "./deploy/config/pgsql/create-testing-databases.sql:/docker-entrypoint-initdb.d/10-create-testing-databases.sql"
            - "./deploy/config/pgsql/create-powersync-user.sh:/docker-entrypoint-initdb.d/20-create-powersync-user.sh:ro"
            - "pgsql:/var/lib/postgresql"
        networks:
            - app
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -q -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"
            interval: 10s
            retries: 5
            timeout: 5s
            start_period: 30s

    powersync:
        # Sync Streams (sync-config.yaml edition: 3) require PowerSync Service v1.20.0+.
        build:
            context: .
            dockerfile: deploy/Dockerfile.powersync
        restart: unless-stopped
        volumes:
            - "./deploy/config/powersync:/config:ro"
        environment:
            POWERSYNC_CONFIG_PATH: /config/service.yaml
            NODE_OPTIONS: --max-old-space-size=1000
            PS_PORT: "8080"
            PS_DATA_SOURCE_URI: "${POWERSYNC_DATA_SOURCE_URI:-postgresql://powersync:password@pgsql:5432/${DB_DATABASE}?sslmode=disable}"
            PS_STORAGE_SOURCE_URI: "${POWERSYNC_STORAGE_SOURCE_URI:-postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/powersync_storage?sslmode=disable}"
            PS_JWT_SECRET: "${POWERSYNC_JWT_SECRET:-powersync-local-poc-secret-32_bytes!}"
        depends_on:
            pgsql:
                condition: service_healthy
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://localhost:8080/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
            interval: 5s
            timeout: 2s
            retries: 15
        ports:
            - "${FORWARD_POWERSYNC_PORT:-6080}:8080"

    redis:
        image: "redis:alpine"
        restart: unless-stopped
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - "redis:/data"
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    garage:
        image: "dxflrs/garage:v2.3.0"
        restart: unless-stopped
        command: "/garage server --single-node --default-bucket"
        environment:
            GARAGE_DEFAULT_ACCESS_KEY: "${AWS_ACCESS_KEY_ID}"
            GARAGE_DEFAULT_SECRET_KEY: "${AWS_SECRET_ACCESS_KEY}"
            GARAGE_DEFAULT_BUCKET: "${AWS_BUCKET:-app}"
        ports:
            - "${FORWARD_GARAGE_PORT:-9000}:3900"
            - "${FORWARD_GARAGE_WEB_PORT:-8900}:3902"
        volumes:
            - "./deploy/config/garage/garage.toml:/etc/garage.toml:ro"
            - "garage-meta:/var/lib/garage/meta"
            - "garage-data:/var/lib/garage/data"
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - /garage
                - -c
                - /etc/garage.toml
                - status
            retries: 3
            timeout: 5s

networks:
    app:
        driver: bridge

volumes:
    pgsql:
        driver: local
    redis:
        driver: local
    garage-meta:
        driver: local
    garage-data:
        driver: local
