services:
  pgsql:
    image: "postgres:18-alpine"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "./database/schema:/schema"
      - "pgsql:/var/lib/postgresql/data"
    networks:
      - app
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -q -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"
      interval: 10s
      retries: 5
      timeout: 5s
      start_period: 30s

  redis:
    image: "redis:alpine"
    restart: unless-stopped
    volumes:
      - "redis:/data"
    networks:
      - app
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s

  gotenberg:
    image: "gotenberg/gotenberg:8.30.0-chromium"
    restart: unless-stopped
    environment:
      CHROMIUM_ALLOW_INSECURE_LOCALHOST: true
      CHROMIUM_IGNORE_CERTIFICATE_ERRORS: true
      CHROMIUM_DISABLE_WEB_SECURITY: true
      CHROMIUM_AUTO_START: true
    networks:
      - app

  garage:
    image: "dxflrs/garage:v1.1.0"
    restart: unless-stopped
    command: "/garage -c /etc/garage.toml server"
    volumes:
      - "./docker/garage/garage.toml:/etc/garage.toml:ro"
      - "garage-meta:/var/lib/garage/meta"
      - "garage-data:/var/lib/garage/data"
    networks:
      - app
    healthcheck:
      test:
        - CMD
        - /garage
        - -c
        - /etc/garage.toml
        - status
      retries: 3
      timeout: 5s

  garage-init:
    image: "dxflrs/garage:v1.1.0"
    restart: "no"
    depends_on:
      garage:
        condition: service_healthy
    environment:
      GARAGE_ACCESS_KEY: "${AWS_ACCESS_KEY_ID:-GKb69252a3b0643e8bd08d4cd4}"
      GARAGE_SECRET_KEY: "${AWS_SECRET_ACCESS_KEY:-9115be9c9e4994306a4176543b0db461f4eb04c5c8a388676d1b57392d0f4e93}"
      GARAGE_BUCKET: "${AWS_BUCKET:-app}"
    command: >-
      /bin/sh -ec '
      NODE_ID="$$(/garage -c /etc/garage.toml status 2>/dev/null | awk "/NO ROLE ASSIGNED/{print \$$1; exit}")";
      if [ -n "$$NODE_ID" ]; then
        /garage -c /etc/garage.toml layout assign -z dc1 -c 10G "$$NODE_ID";
        /garage -c /etc/garage.toml layout apply --version 1;
        sleep 1;
      fi;
      /garage -c /etc/garage.toml key import -n app --yes "$$GARAGE_ACCESS_KEY" "$$GARAGE_SECRET_KEY" 2>/dev/null || true;
      /garage -c /etc/garage.toml bucket create "$$GARAGE_BUCKET" 2>/dev/null || true;
      /garage -c /etc/garage.toml bucket allow --read --write "$$GARAGE_BUCKET" --key "$$GARAGE_ACCESS_KEY";
      '
    volumes:
      - "./docker/garage/garage.toml:/etc/garage.toml:ro"
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  pgsql:
    driver: local
  redis:
    driver: local
  garage-meta:
    driver: local
  garage-data:
    driver: local
